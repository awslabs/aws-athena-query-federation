name: CodeGuru PR Reviewer 

on: [pull_request, workflow_dispatch] 

permissions:
  id-token: write
  security-events: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Respository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '11'
      - name: Build with Maven
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
        run: mvn -B clean package -T 1C --file pom.xml -DskipTests -Dmaven.compiler.release=11 -Dorg.slf4j.simpleLogger.defaultLogLevel=WARN --no-transfer-progress
      - name: Collect Athena JARs into root target folder
        run: |
          mkdir -p target
          find . -type f -regex '.*/athena-[^/]+/target/athena-.*\.jar' -exec cp {} target/ \; 
          echo "Copied JARs:"
          ls -lh target
      - name: Configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::686407537119:role/CodeGuruReviewerGitHubAccessRole
          aws-region: us-east-1
      - name: Amazon CodeGuru Reviewer Scanner
        if: ${{ always() }}
        uses: aws-actions/codeguru-reviewer@v1.1
        with:
          #build_path: target 
          s3_bucket: codeguru-reviewer-686407537119-us-east-1
      - name: Upload result
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeguru-security-results.sarif.json
